name: PR Validation

on:
  pull_request:
    branches: [main]

jobs:
  detect-and-validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          if [ -f "package.json" ]; then
            echo "type=node" >> $GITHUB_OUTPUT
          elif [ -f "requirements.txt" ] || [ -f "pyproject.toml" ]; then
            echo "type=python" >> $GITHUB_OUTPUT
          elif [ -f "build.gradle.kts" ] || [ -f "build.gradle" ]; then
            echo "type=gradle" >> $GITHUB_OUTPUT
          else
            echo "type=unknown" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.detect.outputs.type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Node - Install & Validate
        if: steps.detect.outputs.type == 'node'
        run: |
          npm ci
          npm run lint --if-present
          npm test --if-present -- --run
          npm run build --if-present

      - name: Setup Python
        if: steps.detect.outputs.type == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python - Install & Validate
        if: steps.detect.outputs.type == 'python'
        run: |
          pip install -r requirements.txt 2>/dev/null || pip install -e ".[dev]" 2>/dev/null || true
          python -m pytest --tb=short 2>/dev/null || echo "No tests found"

      - name: Setup Java
        if: steps.detect.outputs.type == 'gradle'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle - Build & Validate
        if: steps.detect.outputs.type == 'gradle'
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Unknown project type
        if: steps.detect.outputs.type == 'unknown'
        run: echo "Could not detect project type. Add a specific CI workflow."
